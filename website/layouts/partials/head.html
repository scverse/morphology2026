{{ $styles := resources.Get "scss/main.scss" | toCSS | minify }}
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta http-equiv="X-UA-Compatible" content="IE=edge" />
<title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}</title>
<meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.eventTagline }}{{ end }}" />

<!-- Favicon (replace files in static/img/favicon/) -->
<link rel="icon" type="image/svg+xml" href="/img/favicon/favicon.svg" />
<link rel="icon" type="image/png" href="/img/favicon/favicon.png" />

<!-- Bootstrap Icons (CDN) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

<!-- Bootstrap CSS (CDN) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" crossorigin="anonymous" />

<!-- Site styles -->
<link rel="stylesheet" href="{{ $styles.RelPermalink }}" />

<!-- Per-event palette overrides (from hugo.toml [params.theme]) -->
<style>
  :root {
    --accent:         {{ .Site.Params.theme.accent        | default "#262fb5" }};
    --accent-dark:    {{ .Site.Params.theme.accentDark    | default "#1a2180" }};
    --gradient-start: {{ .Site.Params.theme.gradientStart | default "#262fb5" }};
    --gradient-end:   {{ .Site.Params.theme.gradientEnd   | default "#74c8fa" }};
    --highlight:      {{ .Site.Params.theme.highlight     | default "#74c8fa" }};
  }
</style>

{{ template "_internal/opengraph.html" . }}
